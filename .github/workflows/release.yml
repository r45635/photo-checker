name: release

# Push a tag like v1.2.0 to build the standalone macOS app and publish a DMG.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-dmg:
    runs-on: macos-latest   # Apple Silicon → arm64 DMG
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install rclone (bundled into the app)
        run: brew install rclone

      - name: Set version from tag
        run: echo "PHOTOCHECKER_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Create venv and install runtime deps
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Build the .app (Next.js export + PyInstaller)
        run: ./build.sh

      - name: Package DMG
        run: ./scripts/package_dmg.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PhotoChecker-*.dmg
          body: |
            ## Photo Checker ${{ github.ref_name }} — macOS (Apple Silicon)

            **Install:** open the DMG and drag **Photo Checker** into Applications.

            **First launch (unsigned build):** right-click the app → **Open** (confirm once),
            or run `xattr -cr "/Applications/Photo Checker.app"`.

            **Full Disk Access** is required to read your Photos library:
            System Settings → Privacy & Security → Full Disk Access → add Photo Checker.

            OneDrive works out of the box (rclone is bundled) — use **Connect OneDrive**
            in the scan dialog to log in once.
